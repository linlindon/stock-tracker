name: Supabase Keep Alive

on:
  schedule:
    # 每 3 天跑一次,UTC 時間 00:00
    - cron: '0 0 */3 * *'
  workflow_dispatch:  # 允許手動觸發測試

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -X GET \
            "${{ secrets.SUPABASE_URL }}/rest/v1/transactions?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
